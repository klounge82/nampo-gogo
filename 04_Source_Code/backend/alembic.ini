# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, used to find modules.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to clone to the "slug" in the migration file name
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow Alembic to run multiple jobs in parallel
# during a migration
# multiprocess = false

sqlalchemy.url = postgresql+psycopg://placeholder_user:placeholder_pass@placeholder_host:5432/placeholder_db

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# subsequent to the creation of a new revision file.
# format:
# hooks = name
# name.type = console_scripts | ...
# name.entrypoint = module:function
# name.options = ...

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
