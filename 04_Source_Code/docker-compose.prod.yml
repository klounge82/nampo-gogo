services:
  nginx:
    image: nginx:alpine
    container_name: nampo_gogo_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/static:/app/static:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # SSL Cert Mount
    depends_on:
      - backend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nampo_gogo_backend_prod
    environment:
      - APP_ENV=production
      - PAYMENT_MODE=mock
    env_file:
      - .env.production
    depends_on:
      - db
    volumes:
      - ./backend/static:/app/static
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  db:
    image: postgres:16-alpine
    container_name: nampo_gogo_postgres_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_prod_data:
